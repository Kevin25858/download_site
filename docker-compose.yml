version: '3.8'

services:
  download-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: download-site
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # 持久化上传的文件 - 可通过 UPLOAD_PATH 自定义路径
      - ${UPLOAD_PATH:-./uploads}:/app/uploads
      # 持久化数据库文件 - 可通过 DATA_PATH 自定义路径
      - ${DATA_PATH:-./instance}:/app/instance
    env_file:
      - .env
    environment:
      - UPLOAD_FOLDER=/app/uploads
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - download-network

networks:
  download-network:
    driver: bridge
