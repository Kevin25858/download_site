<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --bg-secondary: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --border: #d2d2d7;
            --border-light: #e5e5e7;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --danger: #ff3b30;
            --success: #34c759;
            --radius: 12px;
            --radius-sm: 8px;
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
        }

        .login-logo svg {
            width: 100%;
            height: 100%;
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            padding: 11px 16px;
            font-size: 15px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
            text-align: center;
        }

        .message.error {
            background: rgba(255, 59, 48, 0.1);
            color: var(--danger);
        }

        .message.success {
            background: rgba(52, 199, 89, 0.1);
            color: var(--success);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="32" height="32" rx="8" fill="#0071e3"/>
                    <path d="M16 8L22 12V18L16 22L10 18V12L16 8Z" stroke="white" stroke-width="1.5" fill="none"/>
                    <path d="M10 18L16 22L22 18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M16 14V22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="16" cy="12" r="2" fill="white"/>
                </svg>
            </div>
            <h1>登录</h1>
        </div>

        <div id="message" class="message"></div>

        <form id="login-form" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-input" id="username" name="username" placeholder="输入用户名" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="输入密码" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" id="submit-btn">登录</button>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            const messageEl = document.getElementById('message');

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return false;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('登录成功', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 300);
                } else {
                    showMessage(result.message || '登录失败', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }

            return false;
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }

        // 检查是否已登录
        fetch('/api/auth/check')
            .then(r => r.json())
            .then(result => {
                if (result.logged_in) {
                    window.location.href = '/admin';
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
