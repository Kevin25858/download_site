<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_title }} - 下载站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 107, 107, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0);
            }
        }

        .error-icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        .error-title {
            font-size: 26px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .error-message {
            color: #666;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .error-code {
            display: inline-block;
            background: #f8f9fa;
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 12px;
            color: #999;
            margin-bottom: 24px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .secondary-btn {
            background: #f8f9fa;
            color: #666;
            border: 1px solid #e9ecef;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .secondary-btn:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e9ecef;
            font-size: 12px;
            color: #999;
        }

        .help-text {
            margin-top: 20px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            text-align: left;
        }

        .help-text ul {
            margin: 8px 0 0 20px;
            padding: 0;
        }

        .help-text li {
            margin: 4px 0;
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 24px;
            }

            .error-icon {
                width: 80px;
                height: 80px;
            }

            .error-icon svg {
                width: 40px;
                height: 40px;
            }

            .error-title {
                font-size: 22px;
            }

            .action-buttons {
                flex-direction: column;
                width: 100%;
            }

            .back-btn, .secondary-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        </div>

        <h1 class="error-title">{{ error_title }}</h1>
        <p class="error-message">{{ error_message }}</p>
        
        {% if error_code %}
        <div class="error-code">错误代码: {{ error_code }}</div>
        {% endif %}

        <div class="action-buttons">
            <a href="/" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                返回首页
            </a>
            <button class="secondary-btn" onclick="window.location.reload()">
                刷新页面
            </button>
        </div>

        <div class="help-text">
            <strong>可能的原因：</strong>
            <ul>
                <li>下载链接已过期</li>
                <li>已达到最大下载次数限制</li>
                <li>文件已被删除或移动</li>
                <li>链接地址输入错误</li>
            </ul>
        </div>

        <div class="footer">
            <p>虚拟资源下载站</p>
        </div>
    </div>
</body>
</html>
